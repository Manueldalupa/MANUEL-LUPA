<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex Aguilar Valente | Lupa Prime</title>
<style>
  :root{
    --green:#2c433d;
    --green2:#233732;
    --gold:#c99a4c;
    --cream:#f2ead9;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Segoe UI', Arial, sans-serif;
    background:linear-gradient(160deg, var(--green) 0%, var(--green2) 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .card{
    width:100%;
    max-width:400px;
    background:var(--cream);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
  }
  .header{
    background:var(--green2);
    padding:36px 24px 28px;
    text-align:center;
    color:var(--cream);
  }
  .logo{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:22px;
  }
  .logo svg{ width:30px; height:30px; }
  .logo .name{
    font-size:20px;
    font-weight:700;
    letter-spacing:1px;
    color:var(--cream);
  }
  .logo .name span{ color:var(--gold); font-weight:400; }
  .avatar{
    width:96px;
    height:96px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:0 auto 16px;
    border:3px solid var(--gold);
  }
  .header h1{
    font-size:22px;
    font-weight:600;
    margin-bottom:4px;
  }
  .header p{
    font-size:17px;
    font-weight:500;
    color:#cfd8d4;
  }
  .links{
    padding:26px 22px 32px;
    display:flex;
    flex-direction:column;
    gap:11px;
  }
  .link{
    display:flex;
    align-items:center;
    gap:14px;
    padding:12px 14px;
    background:#fff;
    border-radius:14px;
    text-decoration:none;
    color:var(--green2);
    box-shadow:0 2px 8px rgba(20,30,25,0.06);
    border:1px solid #ece6d6;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .link:active{ transform:scale(0.97); box-shadow:0 1px 4px rgba(20,30,25,0.08); }
  .icon{
    width:46px;
    height:46px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .icon svg{ width:22px; height:22px; }
  .text-wrap{
    display:flex;
    flex-direction:column;
    min-width:0;
    flex:1;
  }
  .text-wrap .label{
    font-size:11px;
    font-weight:700;
    letter-spacing:0.6px;
    text-transform:uppercase;
    color:#9a9488;
    margin-bottom:1px;
  }
  .text-wrap .value{
    font-size:15px;
    font-weight:700;
    color:var(--green2);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .chevron{
    flex-shrink:0;
    color:#c7c2b4;
  }
  .whatsapp .icon{ background:#25D366; }
  .site .icon{ background:linear-gradient(135deg, var(--green2), var(--green)); }
  .instagram .icon{ background:radial-gradient(circle at 30% 110%, #ffd776 0%, #f5a13a 20%, #e5433c 45%, #c22e78 70%, #7c3aed 100%); }
  .facebook .icon{ background:#1877F2; }
  .phone .icon{ background:var(--gold); }
  footer{
    text-align:center;
    padding:0 24px 24px;
    font-size:12px;
    color:#8a8f89;
  }
</style>
</head>
